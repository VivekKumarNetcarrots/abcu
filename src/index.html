<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ABCU App</title>

    <base href="/" />
    <!-- PWA Fullscreen -->
    <meta name="theme-color" content="#a024f2" />

    <meta name="color-scheme" content="light dark" />

    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ABCU" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>

  <body>
    <div id="splash-screen">
      <img src="assets/icon/icon-192x192.png" />
      <h1>ABCU</h1>
    </div>
    <div id="install-banner" class="install-banner">
      <div>
        <strong>Install ABCU</strong>
        <p>Get full app experience 🚀</p>
      </div>
      <button (click)="installApp()">Install</button>
      <button (click)="dismissBanner()">✕</button>
    </div>
    <div id="update-box" class="update-box">
      <p>New version available 🚀</p>
      <button (click)="updateApp()">Update</button>
    </div>
    <app-root></app-root>
    <noscript
      >Please enable JavaScript to continue using this application.</noscript
    >
  </body>
</html>
