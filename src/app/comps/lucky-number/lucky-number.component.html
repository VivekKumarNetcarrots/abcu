<div class="vsking">
  <div class="odometer">
    <div class="digit" *ngFor="let d of digits; let i = index">
      <div
        class="digit-inner"
        [class.no-transition]="resetting[i]"
        [style.transform]="transforms[i]"
      >
        <div *ngFor="let n of rollingNumbers">{{ n }}</div>
      </div>
    </div>
  </div>
</div>
<div class="roll-c">
  <button class="roll-btn" (click)="setValueRandom()">Roll</button>
</div>
