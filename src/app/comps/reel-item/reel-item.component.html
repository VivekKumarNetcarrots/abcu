<div class="reels-container">
  <div class="reel-item" *ngFor="let video of videos; let i = index" #reelItem>
    <video
      #videoPlayer
      [src]="video.url"
      playsinline
      webkit-playsinline
      muted
      loop
      preload="metadata"
      (click)="togglePlay(i)"
    ></video>

    <!-- Loader -->
    <div class="loader" *ngIf="video.isBuffering"></div>

    <!-- Title -->
    <div class="title">
      {{ video.title }}
    </div>
  </div>
</div>
