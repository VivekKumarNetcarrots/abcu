<div class="reels-wrapper" (click)="toggleSound()">
  <div class="reels-container" #container>
    <div class="reel" *ngFor="let video of videos; let i = index">
      <video
        #videoPlayer
        [src]="video.url"
        playsinline
        webkit-playsinline
        muted
        loop
      ></video>

      <!-- Loader -->
      <div class="loader" *ngIf="video.isBuffering"></div>
    </div>
  </div>
</div>
